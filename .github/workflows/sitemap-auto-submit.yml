name: Generate Sitemap and Submit to Google

on:
  push:
    paths:
      - '_posts/**'          # Trigger saat ada post baru
      - '*.md'               # Trigger saat halaman utama berubah
    branches:
      - main
  workflow_dispatch:         # Bisa di-trigger manual
  schedule:
    # Jalankan otomatis setiap hari jam 00:00 UTC (7 pagi WIB)
    - cron: '0 0 * * *'

jobs:
  update-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch semua history untuk proper git log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate sitemap.xml
        run: |
          # Install dependencies
          pip install -r .github/scripts/requirements.txt 2>/dev/null || pip install lxml beautifulsoup4
          
          # Jalankan script generate sitemap
          python .github/scripts/generate-sitemap.py
          
          # Tampilkan sitemap yang dibuat
          echo "📄 Generated sitemap.xml:"
          cat sitemap.xml | head -20

      - name: Commit sitemap changes
        id: commit-sitemap
        run: |
          # Cek apakah ada perubahan di sitemap.xml
          if git diff --name-only HEAD | grep -q 'sitemap.xml'; then
            git config --local user.email "github-actions@github.com"
            git config --local user.name "GitHub Actions"
            git add sitemap.xml
            git commit -m "🤖 Auto-update sitemap.xml"
            echo "✅ Sitemap changes committed"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "📭 No changes to sitemap.xml"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.commit-sitemap.outputs.has_changes == 'true'
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Submit to Google Search Console
        run: |
          # Install dependencies untuk GSC
          pip install google-auth google-api-python-client
          
          # Export credentials dari GitHub Secret
          echo "${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}" > /tmp/service-account.json
          
          # Jalankan script submit sitemap
          python .github/scripts/submit-sitemap.py
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}

      - name: Notification on success
        if: success()
        run: |
          echo "🎉 Sitemap updated and submitted to Google Search Console successfully!"
          echo "📅 Next automatic run: Daily at 00:00 UTC (7:00 AM WIB)"

      - name: Notification on failure
        if: failure()
        run: |
          echo "❌ Workflow failed! Check the logs above for details."
          echo "ℹ️  Common issues:"
          echo "  1. GSC_SERVICE_ACCOUNT_JSON secret not configured"
          echo "  2. Google Search Console API not enabled"
          echo "  3. Service account not added to Search Console property"