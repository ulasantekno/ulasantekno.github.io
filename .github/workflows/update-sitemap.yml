name: Update Sitemap
on:
  push:
    branches: [ main ]
    paths:
      - '_posts/**'
      - '_config.yml'
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate sitemap
        run: |
          python .github/scripts/generate-sitemap.py

      - name: Commit and push if changed
        run: |
          git config user.email "admin@ulasantekno.id"
          git config user.name "UlasanTekno"
          git add sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to sitemap.xml"
          else
            git commit -m "Automated sitemap update"
            git push
          fi