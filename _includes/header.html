<header class="page-header" id="draggable-header" role="banner">
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const header = document.getElementById('draggable-header');
    let isDragging = false;
    let startX, startY, initialTop, initialLeft;
    
    header.addEventListener('mousedown', function(e) {
      // Prevent drag if clicking on links
      if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
      
      isDragging = true;
      header.style.cursor = 'grabbing';
      header.style.zIndex = '9999';
      startX = e.clientX;
      startY = e.clientY;
      initialTop = header.offsetTop;
      initialLeft = header.offsetLeft;
      header.style.transition = 'none';
      e.preventDefault();
    });
    
    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      header.style.top = Math.max(0, initialTop + dy) + 'px';
      header.style.left = Math.max(0, initialLeft + dx) + 'px';
    });
    
    document.addEventListener('mouseup', function() {
      if (isDragging) {
        isDragging = false;
        header.style.cursor = 'grab';
        header.style.transition = 'top 0.2s ease, left 0.2s ease';
        setTimeout(() => { header.style.zIndex = '1000'; }, 200);
      }
    });
    
    // Touch support
    header.addEventListener('touchstart', function(e) {
      if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
      
      isDragging = true;
      header.style.zIndex = '9999';
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      initialTop = header.offsetTop;
      initialLeft = header.offsetLeft;
      header.style.transition = 'none';
    }, {passive: true});
    
    document.addEventListener('touchmove', function(e) {
      if (!isDragging) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      header.style.top = Math.max(0, initialTop + dy) + 'px';
      header.style.left = Math.max(0, initialLeft + dx) + 'px';
    }, {passive: true});
    
    document.addEventListener('touchend', function() {
      if (isDragging) {
        isDragging = false;
        header.style.transition = 'top 0.2s ease, left 0.2s ease';
        setTimeout(() => { header.style.zIndex = '1000'; }, 200);
      }
    });
  });
  </script>
  
  <!-- Blog Title as Home Link - COMPACT -->
  <h1 class="project-name">
    <a href="{{ site.url }}" style="color: inherit; text-decoration: none;">
      {{ site.title | default: site.github.repository_name }}
    </a>
  </h1>
  <h2 class="project-tagline">
    {{ site.description | default: site.github.project_tagline }}
  </h2>
  
  <!-- Compact Navigation Menu - All buttons aligned -->
  <nav class="site-nav">
    {% for link in site.header_links %}
      <a href="{{ link.url }}" class="btn{% if page.url == link.url %} active{% endif %}">
        {{ link.title }}
      </a>
    {% endfor %}
  </nav>
</header>
