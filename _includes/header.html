
<header class="page-header" id="page-header" role="banner">
  
  <!-- Blog Title as Home Link - COMPACT -->
  <h1 class="project-name">
    <a href="{{ site.url }}" style="color: inherit; text-decoration: none;">
      {{ site.title | default: site.github.repository_name }}
    </a>
  </h1>
  <h2 class="project-tagline">
    {{ site.description | default: site.github.project_tagline }}
  </h2>
  
  <!-- Compact Navigation Menu - All buttons aligned -->
  <nav class="site-nav">
    {% for link in site.header_links %}
      <a href="{{ link.url }}" class="btn{% if page.url == link.url %} active{% endif %}">
        {{ link.title }}
      </a>
    {% endfor %}
    <span class="category-nav">
      <a href="#" class="btn">📂 Kategori ▾</a>
      <div class="dropdown">
        <a href="/kategori/gadget.html">📱 Gadget</a>
        <a href="/kategori/audio.html">🎵 Audio</a>
        <a href="/kategori/gaming.html">🎮 Gaming</a>
        <a href="/kategori/smart-home.html">🏠 Smart Home</a>
        <a href="/kategori/beauty-tech.html">💇 Beauty Tech</a>
        <a href="/kategori/lifestyle.html">✨ Lifestyle</a>
      </div>
    </span>
  </nav>
</header>
