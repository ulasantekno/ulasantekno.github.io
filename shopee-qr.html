<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Login QR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ee4d2d 0%, #ff7337 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .logo { font-size: 2rem; font-weight: bold; margin-bottom: 10px; }
        h1 { font-size: 1.3rem; margin-bottom: 8px; }
        p { opacity: 0.9; margin-bottom: 25px; font-size: 0.9rem; }
        .qr-container {
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }
        .qr-container img {
            width: 260px;
            height: 260px;
            display: block;
        }
        .timer {
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 20px;
        }
        .note {
            margin-top: 20px;
            font-size: 0.85rem;
            opacity: 0.85;
            max-width: 300px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="logo">🛒 Shopee</div>
    <h1>Login dengan QR Code</h1>
    <p>Scan menggunakan Aplikasi Shopee di HP</p>
    
    <div class="qr-container">
        <img src="assets/shopee-qr.png" alt="Shopee QR Code" id="qr-img">
    </div>
    
    <div class="timer" id="timer">⏳ Refresh dalam 60 detik</div>
    
    <div class="note">
        1. Buka Aplikasi Shopee di HP<br>
        2. Tap Saya → Scan<br>
        3. Arahkan kamera ke QR code di atas<br>
        4. Tap "Confirm" untuk login
    </div>

    <script>
        let seconds = 60;
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            seconds--;
            timerEl.textContent = `⏳ Refresh dalam ${seconds} detik`;
            if (seconds <= 0) {
                clearInterval(interval);
                timerEl.textContent = '❌ QR expired — refresh halaman';
                timerEl.style.background = 'rgba(255,0,0,0.3)';
            }
        }, 1000);
    </script>
</body>
</html>
